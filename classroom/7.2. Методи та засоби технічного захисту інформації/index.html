
<!DOCTYPE html>
<html lang="uk">

<head>

<meta charset="UTF-8">
<title>7.2. Методи та засоби технічного захисту інформації</title>

<script>
if(localStorage.getItem("theme")==="dark")
document.documentElement.classList.add("dark")
</script>


<style>

body{
font-family:Segoe UI,Arial;
margin:0;
background:#f4f6fb;
padding:25px;
transition:.3s;
}

.dark body{
background:#1e1e1e;
color:white;
}

a{
text-decoration:none;
color:inherit;
}

.topbar{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:25px;
}

.btn{
padding:8px 14px;
border:none;
border-radius:8px;
background:#1976d2;
color:white;
cursor:pointer;
font-size:14px;
}

.btn:hover{
background:#0d47a1;
}

.search{
padding:10px;
width:240px;
border-radius:8px;
border:1px solid #ccc;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(240px,1fr));
gap:20px;
}

.card{
background:white;
border-radius:12px;
padding:18px;
box-shadow:0 4px 12px rgba(0,0,0,.1);
transition:.2s;
}

.dark .card{
background:#2c2c2c;
}

.card:hover{
transform:translateY(-4px);
}

.cardlink{
display:block;
}

.icon{
font-size:28px;
margin-bottom:10px;
}

.title{
font-weight:600;
word-break:break-word;
}

.progress{
margin-top:8px;
font-size:13px;
display:flex;
align-items:center;
gap:10px;
}

.star{
cursor:pointer;
font-size:18px;
}

.bar{
height:8px;
background:#ddd;
border-radius:4px;
margin-bottom:18px;
}

.bar-fill{
height:8px;
background:#4caf50;
border-radius:4px;
width:0%;
}

</style>


</head>

<body>

<div class="topbar">

<a class="btn" href="..\../main.html">🏠 Портал</a>
<a class="btn" href="..\../classroom/index.html">📚 Classroom</a>
<a class="btn" href="..\../moodle/index.html">🎓 Moodle</a>
<a class="btn" href="..\../edki/index.html">📂 ЄДКІ</a>

<button class="btn" onclick="toggleTheme()">🌙 Темна тема</button>

<input id="search" class="search" onkeyup="searchFiles()" placeholder="Пошук...">

</div>

<h2>7.2. Методи та засоби технічного захисту інформації</h2>


<div id="progresslabel">Прогрес: 0%</div>

<div class="bar">
<div id="progressbar" class="bar-fill"></div>
</div>


<div class="grid">


<a class="cardlink" href="../index.html">
<div class="card">
<div class="icon">⬅️</div>
<div class="title">Назад</div>
</div>
</a>

<div class="card">

<a class="cardlink" href="METODSCH.pdf" target="_blank">

<div class="icon">📕</div>
<div class="title">METODSCH.pdf</div>

</a>

<div class="progress">

<label>
<input type="checkbox" class="learnbox" id="METODSCHpdf" onclick="toggleLearned('METODSCHpdf')">
вивчено
</label>

<span class="star" id="star_METODSCHpdf" data-id="METODSCHpdf" onclick="toggleStar('METODSCHpdf')">☆</span>

</div>

</div>

<div class="card">

<a class="cardlink" href="Мetody.pdf" target="_blank">

<div class="icon">📕</div>
<div class="title">Мetody.pdf</div>

</a>

<div class="progress">

<label>
<input type="checkbox" class="learnbox" id="etodypdf" onclick="toggleLearned('etodypdf')">
вивчено
</label>

<span class="star" id="star_etodypdf" data-id="etodypdf" onclick="toggleStar('etodypdf')">☆</span>

</div>

</div>


</div>


<script>

function toggleTheme(){

if(document.documentElement.classList.contains("dark")){
document.documentElement.classList.remove("dark")
localStorage.setItem("theme","light")
}else{
document.documentElement.classList.add("dark")
localStorage.setItem("theme","dark")
}

}

function searchFiles(){

let input=document.getElementById("search").value.toLowerCase()
let cards=document.querySelectorAll(".card")

cards.forEach(c=>{
if(c.innerText.toLowerCase().includes(input))
c.style.display=""
else
c.style.display="none"
})

}

function toggleLearned(id){

let box=document.getElementById(id)

if(box.checked)
localStorage.setItem("done_"+id,"1")
else
localStorage.removeItem("done_"+id)

updateProgress()

}

function toggleStar(id){

let star=document.getElementById("star_"+id)

if(localStorage.getItem("star_"+id)){
localStorage.removeItem("star_"+id)
star.innerText="☆"
}else{
localStorage.setItem("star_"+id,"1")
star.innerText="⭐"
}

}

function loadState(){

document.querySelectorAll(".learnbox").forEach(box=>{
if(localStorage.getItem("done_"+box.id))
box.checked=true
})

document.querySelectorAll(".star").forEach(s=>{
let id=s.dataset.id
if(localStorage.getItem("star_"+id))
s.innerText="⭐"
})

updateProgress()

}

function updateProgress(){

let boxes=document.querySelectorAll(".learnbox")

let done=0
boxes.forEach(b=>{
if(localStorage.getItem("done_"+b.id))
done++
})

let percent=0
if(boxes.length>0)
percent=Math.round(done/boxes.length*100)

let bar=document.getElementById("progressbar")
if(bar) bar.style.width=percent+"%"

let label=document.getElementById("progresslabel")
if(label) label.innerText="Прогрес: "+percent+"%"

}

window.onload=loadState

</script>


</body>
</html>
